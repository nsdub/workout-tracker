name = "protocol-workout"
compatibility_date = "2026-04-01"
compatibility_flags = ["nodejs_compat"]
pages_build_output_dir = ".svelte-kit/cloudflare"

# D1 Database binding
# After creating with: npx wrangler d1 create protocol-workout-db
# Replace the database_id below with the value returned
[[d1_databases]]
binding = "DB"
database_name = "protocol-workout-db"
database_id = "PLACEHOLDER_REPLACE_WITH_ACTUAL_ID"

# Auth secret - set via:
# npx wrangler pages secret put AUTH_PIN
# (the user will set this to their chosen PIN)
[vars]
APP_NAME = "Protocol Workout"
