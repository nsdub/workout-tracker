<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
  <meta name="theme-color" content="#0c0a09">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Protocol</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" href="icons/icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="icons/icon.svg">
  <script>
    // Resolve light/dark before first paint so light users get no dark flash.
    try {
      var p3s = JSON.parse(localStorage.getItem('p3.settings') || '{}');
      document.documentElement.dataset.mode =
        p3s.theme === 'light' || p3s.theme === 'dark'
          ? p3s.theme
          : (matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
    } catch (e) { document.documentElement.dataset.mode = 'dark'; }
  </script>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app" id="app">
    <div class="scene" id="scene" aria-hidden="true"></div>
    <header class="topbar">
      <div class="wordmark">Protocol</div>
      <div class="topbar-right">
        <button class="phase-chip" id="phase-chip" aria-label="Current phase"></button>
        <button class="sync-dot" id="sync-dot" aria-label="Sync status"></button>
      </div>
    </header>

    <main class="views" id="views">
      <section class="view" id="view-today" data-view="today"></section>
      <section class="view" id="view-history" data-view="history"></section>
      <section class="view" id="view-plan" data-view="plan"></section>
    </main>

    <div class="dock" id="dock"></div>

    <nav class="tabbar" id="tabbar">
      <button class="tab" data-tab="today" aria-label="Today">
        <svg viewBox="0 0 24 24"><path d="M4 12h2.2M17.8 12H20M7 8.5v7M17 8.5v7M9.5 12h5" stroke-linecap="round"/></svg>
        <span>Today</span>
      </button>
      <button class="tab" data-tab="history" aria-label="History">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="8"/><path d="M12 8v4.2l2.8 1.6" stroke-linecap="round"/></svg>
        <span>History</span>
      </button>
      <button class="tab" data-tab="plan" aria-label="Plan">
        <svg viewBox="0 0 24 24"><rect x="4.5" y="5.5" width="15" height="14" rx="2.5"/><path d="M4.5 10h15M9 3.5v3.5M15 3.5v3.5" stroke-linecap="round"/></svg>
        <span>Plan</span>
      </button>
    </nav>
  </div>

  <div class="sheet-root" id="sheet-root"></div>
  <div class="toast-root" id="toast-root"></div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
